<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape Room - Arduino Interface</title>
  </head>
  <body>
    <div id="app">
      <!-- CONNECTION SCREEN -->
      <div id="connection-screen" class="screen">
        <h1>🔓 Escape Room</h1>
        <p class="subtitle">Arduino Uno R3 verbinden</p>
        
        <div class="card connection-card">
          <p class="info-text">Bitte verbinde deinen Arduino, um zu beginnen</p>
          <button id="connect-btn" type="button" class="primary-btn">Arduino verbinden</button>
          <div>
            <p id="connection-status" class="status-disconnected">Status: Nicht verbunden</p>
          </div>
          
          <button id="start-btn" type="button" class="start-btn disabled">🎮 Spiel starten</button>
          
          <!-- DEBUG PANEL -->
          <div id="debug-panel" class="debug-panel">
            <h3>🔧 Debug-Info</h3>
            <p><strong>Port Status:</strong> <span id="port-status">Kein Port</span></p>
            <p><strong>Leseschleife:</strong> <span id="read-loop-status">Nicht aktiv</span></p>
            <p><strong>Zuletzt empfangen:</strong> <span id="last-message">Warten...</span></p>
            <div id="debug-log" class="debug-log">
              <h4>Log:</h4>
              <div id="log-content"></div>
            </div>
            <button id="clear-log-btn" class="debug-btn">Log löschen</button>
            <button id="test-btn" class="debug-btn">Test-Nachricht senden</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
