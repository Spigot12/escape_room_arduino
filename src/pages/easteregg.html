<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🥚</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      #filip-image {
        width: 100vw;
        height: 100vh;
        object-fit: cover; /* Cover statt contain - füllt das ganze Bild aus */
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Nur das Filip Bild - sonst nichts -->
    <img
      id="filip-image"
      src="filip.png"
      alt="Filip"
      onclick="window.location.href = 'map.html'"
    />
  </body>
</html>
