<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape Room - Arduino Interface</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>
  <body class="bg-white text-dark">
    <div id="arduino-indicator" class="arduino-status-indicator disconnected"></div>
    
    <div class="container py-5">
      <div id="app" class="row justify-content-center min-vh-100 align-items-center">
        <!-- CONNECTION SCREEN -->
        <div id="connection-screen" class="col-md-8 col-lg-5">
          <div class="text-center mb-5">
            <h1 class="display-3 fw-bold mb-2">
              Arduino Projekt
            </h1>
            <p class="h5 text-muted fw-normal">Verbinde dein Arduino, um das Experiment zu starten.</p>
          </div>
      
          <div class="minimal-card mb-4">
            <div class="card-body p-0">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <label class="form-label small text-uppercase text-muted fw-bold mb-0">Port auswählen</label>
                <button id="disconnect-btn" type="button" class="btn btn-link btn-sm text-danger text-decoration-none p-0 hidden" title="Arduino trennen">
                  <i class="bi bi-plug-fill me-1"></i>Trennen
                </button>
              </div>
              <div id="port-selection" class="input-group mb-4">
                <select id="port-select" class="form-select form-select-lg bg-light border-0 rounded-3 shadow-none">
                  <option value="">Suche nach Ports...</option>
                </select>
                <button id="refresh-ports-btn" class="btn btn-dark ms-2 rounded-3" type="button" title="Aktualisieren">
                  <i class="bi bi-arrow-clockwise"></i>
                </button>
              </div>
          
              <div class="d-grid gap-3">
                <button id="connect-btn" type="button" class="btn btn-primary btn-lg rounded-3 py-3 shadow-sm">
                  <i class="bi bi-plug-fill me-2"></i>Arduino verbinden
                </button>
              </div>
          
              <div class="my-4 text-center">
                <div id="connection-status" class="small text-muted fw-bold">
                  Status: Prüfe Verbindung...
                </div>
              </div>
          
              <div class="d-grid">
                <button id="start-btn" type="button" class="btn btn-success btn-lg rounded-3 disabled py-3 shadow-sm">
                  Experiment starten
                </button>
              </div>
            </div>
          </div>

          <!-- DEBUG PANEL (MINIMALIST) -->
          <div id="debug-panel" class="opacity-75">
            <div class="d-flex justify-content-between align-items-center mb-2 px-2">
              <span class="small fw-bold text-muted">System Log</span>
              <button id="clear-log-btn" class="btn btn-link btn-sm text-muted text-decoration-none p-0">Clear</button>
            </div>
            
            <div id="debug-log" class="p-3 overflow-auto" style="height: 120px; font-size: 0.8rem;">
              <div id="log-content"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/scripts/entry-points/main.js"></script>
  </body>
</html>
