<!-- leaderboard.html -->
<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard - Escape Room</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-white text-dark">
    <div
      id="arduino-indicator"
      class="arduino-status-indicator disconnected"
    ></div>

    <div class="container py-5">
      <div id="app" class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <div
            class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom"
          >
            <button id="back-btn" class="btn btn-dark btn-sm">
              <i class="bi bi-arrow-left me-1"></i>Zurück
            </button>
            <h1 class="h4 mb-0 fw-bold">
              <i class="bi bi-trophy-fill me-2 text-warning"></i>Leaderboard
            </h1>
            <div style="width: 80px"></div>
          </div>

          <div class="minimal-card p-4">
            <div id="leaderboard-content">
              <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/scripts/entry-points/leaderboard.js"></script>
  </body>
</html>
