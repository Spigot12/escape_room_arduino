<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level 2 - Escape Room</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>
  <body class="bg-white text-dark">
    <div id="arduino-indicator" class="arduino-status-indicator disconnected"></div>
    
    <div class="container py-5">
      <div id="app" class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          
          <div class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom">
            <button id="back-btn" class="btn btn-dark btn-sm">
              <i class="bi bi-arrow-left me-1"></i>Zurück
            </button>
            <h1 class="h4 mb-0 fw-bold">Experiment 02</h1>
            <div style="width: 80px;"></div>
          </div>

          <div class="level-content text-center">
            <div class="minimal-card p-5 mb-5 shadow-sm">
              <h2 class="display-5 fw-bold mb-4">Das Licht</h2>
              <p id="status-text" class="lead text-muted mb-0">
                Verdecke den Lichtsensor auf deinem Arduino.
              </p>
            </div>

            <div class="text-start mb-5">
              <h3 class="small fw-bold text-muted text-uppercase mb-3 px-2">Aufgabenliste:</h3>
              <ul id="task-list" class="list-group list-group-flush">
                <li class="list-group-item">
                  Lichtsensor (LDR) abdecken
                </li>
                <li class="list-group-item">
                  Für 5 Sekunden dunkel halten
                </li>
              </ul>
            </div>

            <div id="result-display" class="result-display hidden p-5 bg-light border-0 rounded-4 mb-4" style="display: none;">
              <h2 class="display-5 fw-bold mb-3 text-warning">
                <i class="bi bi-lightbulb-fill me-2"></i>Warte...
              </h2>
              <p class="lead mb-4 text-muted">Lichtwerte stabilisiert. Experiment abgeschlossen.</p>
              <button id="next-level-btn" class="btn btn-primary btn-lg px-5 shadow-sm">
                Nächstes Experiment <i class="bi bi-arrow-right ms-2"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/scripts/entry-points/level.js"></script>
  </body>
</html>
