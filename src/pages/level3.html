<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level 3 - Escape Room</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>
  <body class="bg-white text-dark">
    <div id="arduino-indicator" class="arduino-status-indicator disconnected"></div>
    
    <div class="container py-5">
      <div id="app" class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          
          <div class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom">
            <button id="back-btn" class="btn btn-dark btn-sm">
              <i class="bi bi-arrow-left me-1"></i>Zurück
            </button>
            <h1 class="h4 mb-0 fw-bold">Level 03</h1>
            <button id="toggle-log-btn" class="btn btn-outline-secondary btn-sm" title="System Log anzeigen">
              <i class="bi bi-terminal"></i>
            </button>
          </div>

          <!-- LOG PANEL (versteckt by default) -->
          <div id="log-panel" class="mb-4" style="display: none;">
            <div class="card shadow-sm">
              <div class="card-header d-flex justify-content-between align-items-center">
                <span class="small fw-bold">System Log</span>
                <button id="clear-log-btn" class="btn btn-link btn-sm text-muted text-decoration-none p-0">Clear</button>
              </div>
              <div class="card-body p-3" style="max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; background: #f8f9fa;">
                <div id="log-content"></div>
              </div>
            </div>
          </div>

          <div class="level-content text-center">
            <div class="minimal-card p-5 mb-5 shadow-sm">
              <h2 class="display-5 fw-bold mb-4">Die Bewegung</h2>
              <p id="status-text" class="lead text-muted mb-0">
                Bewege dich vor dem Sensor.
              </p>
            </div>

            <div class="text-start mb-5">
              <h3 class="small fw-bold text-muted text-uppercase mb-3 px-2">Aufgabenliste:</h3>
              <ul id="task-list" class="list-group list-group-flush">
                <li class="list-group-item">
                  Bewegungssensor (PIR) auslösen
                </li>
                <li class="list-group-item">
                  Alle Level abschließen
                </li>
              </ul>
            </div>

            <div id="result-display" class="result-display hidden p-5 bg-light border-0 rounded-4 mb-4" style="display: none;">
              <h2 class="display-5 fw-bold mb-3 text-success">
                <i class="bi bi-trophy-fill me-2"></i>Geschafft!
              </h2>
              <p class="lead mb-3 text-muted">Du hast alle Level abgeschlossen!</p>

              <div id="completion-info" class="mb-4">
                <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
                  <div class="text-center">
                    <div class="small text-muted text-uppercase fw-bold">Deine Zeit</div>
                    <div id="final-time" class="display-6 fw-bold text-primary">--:--</div>
                  </div>
                </div>
                <div id="leaderboard-status" class="alert alert-info small">
                  <i class="bi bi-hourglass-split me-2"></i>Wird gespeichert...
                </div>
              </div>

              <div class="d-grid gap-2">
                <button id="view-leaderboard-btn" class="btn btn-warning btn-lg shadow-sm">
                  <i class="bi bi-trophy-fill me-2"></i>Leaderboard ansehen
                </button>
                <button id="restart-btn" class="btn btn-outline-primary btn-lg shadow-sm">
                  <i class="bi bi-house-fill me-2"></i>Zur Startseite
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
<script src="/socket.io/socket.io.js"></script>
<script type="module" src="/scripts/auth-check.js"></script>
<script type="module" src="/scripts/entry-points/level.js"></script>
</body>
</html>
