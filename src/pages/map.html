<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Map</title>
    <style>
      body {
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
      }

      #game-container {
        display: flex;
        flex-direction: column;
        border: 2px solid #555;
        background: #111;
      }

      #game-area {
        position: relative;
        width: 800px;
        height: 450px;
        background: #333;
        overflow: hidden;
      }

      #map {
        position: absolute;
        width: 2000px;
        height: 1200px;
        background: #2b2b2b;
      }

      .room {
        position: absolute;
        border: 2px solid #000;
        background: #555;
      }

      .task {
        background: #6b8e23;
      }

      .locked {
        background: #8b0000;
        border: 3px solid #ff0000;
      }

      #player {
        position: absolute;
        width: 30px;
        height: 30px;
        background: #ffcc00;
        border-radius: 4px;
        border: 2px solid #000;
      }

      #ui {
        width: 800px;
        height: 100px;
        background: #1a1a1a;
        border-top: 2px solid #555;
        display: flex;
        align-items: center;
        padding: 10px;
        gap: 10px;
      }

      .slot {
        width: 60px;
        height: 60px;
        border: 2px solid #777;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
      }

      #interaction {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #fff;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game-area">
        <div id="map">
          <!-- Räume -->
          <div
            id="room1"
            class="room task"
            style="left: 500px; top: 80px; width: 250px; height: 200px"
          ></div>
          <div
            id="room2"
            class="room locked"
            style="left: 500px; top: 320px; width: 250px; height: 200px"
          ></div>

          <div
            class="room"
            style="left: 100px; top: 600px; width: 300px; height: 200px"
          ></div>
          <div
            class="room"
            style="left: 900px; top: 200px; width: 350px; height: 250px"
          ></div>
          <div
            class="room"
            style="left: 1400px; top: 700px; width: 300px; height: 250px"
          ></div>

          <div id="player"></div>
          <div id="interaction">Drücke E</div>
        </div>
      </div>

      <div id="ui">
        <div id="slot1" class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <script>
      const player = document.getElementById("player");
      const map = document.getElementById("map");
      const interaction = document.getElementById("interaction");
      const slot1 = document.getElementById("slot1");

      const room1 = document.getElementById("room1");
      const room2 = document.getElementById("room2");

      let playerX = 200;
      let playerY = 200;
      const speed = 3;

      const keys = { w: false, a: false, s: false, d: false };

      let canEnterLevel1 = false;

      function updateInventory() {
        const hasKey = localStorage.getItem("level1_key") === "true";
        slot1.innerText = hasKey ? "🔑" : "";
      }

      updateInventory();

      function rectsOverlap(r1, r2) {
        return !(
          r1.x > r2.x + r2.width ||
          r1.x + r1.width < r2.x ||
          r1.y > r2.y + r2.height ||
          r1.y + r1.height < r2.y
        );
      }

      function updateCamera() {
        const viewWidth = 800;
        const viewHeight = 450;

        let camX = playerX - viewWidth / 2;
        let camY = playerY - viewHeight / 2;

        camX = Math.max(0, Math.min(camX, 2000 - viewWidth));
        camY = Math.max(0, Math.min(camY, 1200 - viewHeight));

        map.style.left = -camX + "px";
        map.style.top = -camY + "px";
      }

      function update() {
        if (keys.w) playerY -= speed;
        if (keys.s) playerY += speed;
        if (keys.a) playerX -= speed;
        if (keys.d) playerX += speed;

        player.style.left = playerX + "px";
        player.style.top = playerY + "px";

        updateCamera();

        const p = player.getBoundingClientRect();
        const r1 = room1.getBoundingClientRect();
        const r2 = room2.getBoundingClientRect();

        const hasKey = localStorage.getItem("level1_key") === "true";

        if (rectsOverlap(p, r1)) {
          interaction.style.display = "block";
          interaction.innerText = "Drücke E für Level 1";
          canEnterLevel1 = true;
        } else {
          interaction.style.display = "none";
          canEnterLevel1 = false;
        }

        if (rectsOverlap(p, r2)) {
          if (!hasKey) {
            interaction.style.display = "block";
            interaction.innerText = "Verschlossen – Schlüssel nötig";
            playerY -= speed * 2;
          } else {
            interaction.style.display = "block";
            interaction.innerText = "Raum geöffnet!";
          }
        }

        requestAnimationFrame(update);
      }

      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (keys[k] !== undefined) keys[k] = true;

        if (k === "e" && canEnterLevel1) {
          window.location.href = "level1.html";
        }
      });

      window.addEventListener("keyup", (e) => {
        const k = e.key.toLowerCase();
        if (keys[k] !== undefined) keys[k] = false;
      });

      update();
    </script>
  </body>
</html>
