<!-- map.html -->
<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Map</title>
    <style>
      body {
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
      }

      #game-container {
        display: flex;
        flex-direction: column;
        border: 2px solid #555;
        background: #111;
      }

      #game-area {
        position: relative;
        width: 800px;
        height: 450px;
        background: #333;
        overflow: hidden;
      }

      #map {
        position: absolute;
        width: 2000px;
        height: 1200px;
        background: #2b2b2b;
      }

      .room {
        position: absolute;
        background: #555;
      }
      .task {
        background: #1a4d1a;
        border: 4px solid #00ff00;
      }
      .green-open {
        background: #1a4d1a;
        border: 4px solid transparent;
      }
      .locked {
        background: #8b0000;
        border: 4px solid #ff0000;
      }
      .open {
        background: #8b0000;
        border: 4px solid transparent;
      }
      .purple-locked {
        background: #4a0066;
        border: 4px solid #9933ff;
      }
      .purple-open {
        background: #4a0066;
        border: 4px solid transparent;
      }
      .orange-locked {
        background: #663300;
        border: 4px solid #ff8800;
      }
      .orange-open {
        background: #663300;
        border: 4px solid transparent;
      }
      .blue-locked {
        background: #003366;
        border: 4px solid #0066ff;
      }
      .blue-open {
        background: #003366;
        border: 4px solid transparent;
      }
      .yellow-locked {
        background: #666600;
        border: 4px solid #ffff00;
      }
      .yellow-open {
        background: #666600;
        border: 4px solid transparent;
      }
      .cyan-locked {
        background: #006666;
        border: 4px solid #00ffff;
      }
      .cyan-open {
        background: #006666;
        border: 4px solid transparent;
      }
      .magenta-locked {
        background: #660066;
        border: 4px solid #ff00ff;
      }
      .magenta-open {
        background: #660066;
        border: 4px solid transparent;
      }

      .room-label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 80px;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.15);
        pointer-events: none;
        user-select: none;
      }

      #player {
        position: absolute;
        width: 30px;
        height: 30px;
        background: #ffcc00;
        border-radius: 4px;
        border: 2px solid #000;
        z-index: 10;
      }

      #coin {
        position: absolute;
        width: 25px;
        height: 25px;
        background: #ffd700;
        border-radius: 50%;
        border: 2px solid #ff8800;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 16px;
        animation: coin-float 2s ease-in-out infinite;
      }

      @keyframes coin-float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      #interaction {
        position: absolute;
        padding: 5px 10px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #fff;
        display: none;
        font-size: 14px;
        pointer-events: none;
        z-index: 20;
        white-space: nowrap;
      }

      #ui {
        width: 800px;
        height: 100px;
        background: #1a1a1a;
        border-top: 2px solid #555;
        display: flex;
        align-items: center;
        padding: 10px;
        gap: 10px;
        justify-content: space-between;
      }

      .slot {
        width: 60px;
        height: 60px;
        border: 2px solid #777;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
      }

      #restart-btn {
        padding: 10px 20px;
        background: #aa0000;
        border: 2px solid #ff4444;
        color: white;
        cursor: pointer;
        border-radius: 6px;
        font-weight: bold;
      }
      #restart-btn:hover {
        background: #cc0000;
      }

      /* Timer display in UI */
      #timer-display {
        font-size: 1.1rem;
        font-weight: bold;
        color: #aaa;
        font-family: "Courier New", monospace;
        letter-spacing: 2px;
        min-width: 70px;
        text-align: center;
      }

      /* SECRET DOOR */
      #secret-door {
        position: absolute;
        width: 22px;
        height: 90px;
        right: 0;
        top: 555px;
        background: linear-gradient(
          180deg,
          #c8a214 0%,
          #f5d248 30%,
          #c8a214 60%,
          #f5d248 80%,
          #c8a214 100%
        );
        border: 3px solid #ffd700;
        border-right: none;
        box-shadow: -3px 0 18px rgba(255, 215, 0, 0.7);
        animation: door-glow 1.8s ease-in-out infinite;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #secret-door::before {
        content: "🔒";
        font-size: 12px;
      }
      @keyframes door-glow {
        0%,
        100% {
          box-shadow: -3px 0 18px rgba(255, 215, 0, 0.7);
        }
        50% {
          box-shadow:
            -3px 0 35px rgba(255, 215, 0, 1),
            -8px 0 20px rgba(255, 200, 0, 0.5);
        }
      }

      /* LOCK OVERLAY */
      #lock-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.88);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      #lock-overlay.active {
        display: flex;
      }

      #lock-box {
        background: linear-gradient(160deg, #1c1c1c 0%, #2a2a2a 100%);
        border: 2px solid #444;
        border-radius: 20px;
        padding: 36px 40px 40px;
        text-align: center;
        min-width: 420px;
        box-shadow:
          0 0 60px rgba(0, 0, 0, 0.8),
          0 0 20px rgba(255, 215, 0, 0.15);
        position: relative;
      }

      #lock-close {
        position: absolute;
        top: 14px;
        right: 18px;
        background: none;
        border: none;
        color: #666;
        font-size: 1.4rem;
        cursor: pointer;
        line-height: 1;
      }
      #lock-close:hover {
        color: #ccc;
      }

      .lock-title {
        font-size: 1.1rem;
        font-weight: bold;
        color: #999;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .lock-subtitle {
        font-size: 0.8rem;
        color: #555;
        margin-bottom: 28px;
      }

      #bike-lock-body {
        background: linear-gradient(
          180deg,
          #1a1a1a 0%,
          #2d2d2d 40%,
          #1a1a1a 100%
        );
        border: 3px solid #3a3a3a;
        border-radius: 14px;
        padding: 18px 20px;
        margin: 0 auto 24px;
        display: inline-block;
        box-shadow:
          inset 0 2px 6px rgba(0, 0, 0, 0.6),
          0 4px 20px rgba(0, 0, 0, 0.5);
        position: relative;
      }
      #bike-lock-body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.08),
          transparent
        );
        border-radius: 14px 14px 0 0;
      }

      .wheels-window {
        position: relative;
        display: flex;
        gap: 6px;
        background: #111;
        border: 2px solid #222;
        border-radius: 8px;
        padding: 4px;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.8);
      }
      .wheels-window::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 4px;
        right: 4px;
        height: 52px;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.035);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        pointer-events: none;
        z-index: 1;
      }

      .wheel-drum {
        width: 56px;
        height: 160px;
        position: relative;
        overflow: hidden;
        border-radius: 6px;
        background: #0d0d0d;
        box-shadow:
          inset 2px 0 5px rgba(0, 0, 0, 0.5),
          inset -2px 0 5px rgba(0, 0, 0, 0.5);
        cursor: ns-resize;
        user-select: none;
      }
      .wheel-drum::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.95) 0%,
          rgba(0, 0, 0, 0.4) 28%,
          rgba(0, 0, 0, 0) 42%,
          rgba(0, 0, 0, 0) 58%,
          rgba(0, 0, 0, 0.4) 72%,
          rgba(0, 0, 0, 0.95) 100%
        );
        z-index: 3;
        pointer-events: none;
        border-radius: 6px;
      }

      .wheel-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        will-change: transform;
      }

      .wheel-digit {
        width: 56px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        font-weight: 900;
        font-family: "Courier New", monospace;
        color: #bbb;
        letter-spacing: -2px;
        flex-shrink: 0;
        border-bottom: 1px solid #1a1a1a;
      }
      .wheel-digit.selected {
        color: #fff;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
      }

      .wheel-label {
        font-size: 0.65rem;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 8px;
        text-align: center;
        width: 56px;
      }

      #lock-submit {
        background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
        border: 2px solid #555;
        color: #bbb;
        font-weight: bold;
        font-size: 0.9rem;
        padding: 10px 28px;
        border-radius: 8px;
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: all 0.2s;
        width: 100%;
        margin-top: 4px;
      }
      #lock-submit:hover {
        background: linear-gradient(135deg, #333, #444);
        border-color: #777;
        color: #fff;
      }

      #lock-message {
        margin-top: 14px;
        font-size: 0.9rem;
        min-height: 22px;
        color: #666;
      }

      /* SUCCESS SCREEN */
      #lock-unlocked {
        display: none;
        padding: 10px 0;
      }
      #lock-unlocked .unlock-icon {
        font-size: 4rem;
        margin-bottom: 16px;
        animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes pop-in {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      #lock-unlocked h2 {
        color: #00cc66;
        font-size: 2rem;
        font-weight: 900;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }
      #lock-unlocked p {
        color: #777;
        font-size: 0.9rem;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      /* Zeit-Highlight in der Erfolgsanzeige */
      #lock-unlocked .time-highlight {
        color: #ffd700;
        font-weight: 900;
        font-family: "Courier New", monospace;
        font-size: 1.05rem;
      }

      #leaderboard-btn {
        background: linear-gradient(135deg, #1a4d1a, #2d7a2d);
        border: 2px solid #00cc66;
        color: #fff;
        font-weight: bold;
        font-size: 1rem;
        padding: 14px 32px;
        border-radius: 10px;
        cursor: pointer;
        width: 100%;
        letter-spacing: 1px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      #leaderboard-btn:hover {
        background: linear-gradient(135deg, #2d7a2d, #3a9a3a);
        box-shadow: 0 0 20px rgba(0, 204, 102, 0.4);
      }

      /* Hint dots */
      .hint-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 20px;
      }
      .hint-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid #333;
        background: #1a1a1a;
        transition: all 0.3s;
      }
      .hint-dot.found {
        background: #c8a214;
        border-color: #ffd700;
        box-shadow: 0 0 6px rgba(255, 215, 0, 0.5);
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
        60% {
          transform: translateX(-8px);
        }
        80% {
          transform: translateX(8px);
        }
      }
      .shake {
        animation: shake 0.45s ease;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game-area">
        <div id="map">
          <div
            id="room1"
            class="room task"
            style="left: 300px; top: 150px; width: 250px; height: 200px"
          >
            <span class="room-label">1</span>
          </div>
          <div
            id="room2"
            class="room locked"
            style="left: 750px; top: 100px; width: 250px; height: 200px"
          >
            <span class="room-label">2</span>
          </div>
          <div
            id="room3"
            class="room purple-locked"
            style="left: 150px; top: 500px; width: 250px; height: 200px"
          >
            <span class="room-label">3</span>
          </div>
          <div
            id="room4"
            class="room orange-locked"
            style="left: 1200px; top: 450px; width: 250px; height: 200px"
          >
            <span class="room-label">4</span>
          </div>
          <div
            id="room5"
            class="room blue-locked"
            style="left: 600px; top: 800px; width: 250px; height: 200px"
          >
            <span class="room-label">5</span>
          </div>
          <div
            id="room6"
            class="room yellow-locked"
            style="left: 1500px; top: 150px; width: 250px; height: 200px"
          >
            <span class="room-label">6</span>
          </div>
          <div
            id="room7"
            class="room cyan-locked"
            style="left: 250px; top: 850px; width: 250px; height: 200px"
          >
            <span class="room-label">7</span>
          </div>
          <div
            id="room8"
            class="room magenta-locked"
            style="left: 1400px; top: 800px; width: 250px; height: 200px"
          >
            <span class="room-label">8</span>
          </div>

          <div id="secret-door"></div>
          <div id="coin" style="left: 900px; top: 500px">💰</div>
          <div id="player"></div>
          <div id="interaction"></div>
        </div>
      </div>

      <div id="ui">
        <div style="display: flex; gap: 10px">
          <div id="slot1" class="slot"></div>
          <div id="slot2" class="slot"></div>
          <div id="slot3" class="slot"></div>
          <div id="slot4" class="slot"></div>
          <div id="slot5" class="slot"></div>
        </div>
        <!-- Live-Timer im UI -->
        <div id="timer-display">0:00</div>
        <button id="restart-btn">Restart</button>
      </div>
    </div>

    <!-- LOCK OVERLAY -->
    <div id="lock-overlay">
      <div id="lock-box">
        <button id="lock-close">✕</button>

        <div class="lock-title">Geheimtür</div>
        <div class="lock-subtitle">Finde die Ziffern in den Levels</div>

        <div class="hint-dots">
          <div class="hint-dot" id="hint-d1" title="Level 2"></div>
          <div class="hint-dot" id="hint-d2" title="Level 3"></div>
          <div class="hint-dot" id="hint-d3" title="Level 5"></div>
          <div class="hint-dot" id="hint-d4" title="Level 8"></div>
        </div>

        <div id="lock-input-section">
          <div id="bike-lock-body">
            <div class="wheels-window">
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                "
              >
                <div class="wheel-drum" id="wheel0">
                  <div class="wheel-inner" id="inner0"></div>
                </div>
                <div class="wheel-label">L2</div>
              </div>
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                "
              >
                <div class="wheel-drum" id="wheel1">
                  <div class="wheel-inner" id="inner1"></div>
                </div>
                <div class="wheel-label">L3</div>
              </div>
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                "
              >
                <div class="wheel-drum" id="wheel2">
                  <div class="wheel-inner" id="inner2"></div>
                </div>
                <div class="wheel-label">L5</div>
              </div>
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                "
              >
                <div class="wheel-drum" id="wheel3">
                  <div class="wheel-inner" id="inner3"></div>
                </div>
                <div class="wheel-label">L7</div>
              </div>
            </div>
          </div>

          <button id="lock-submit">ÖFFNEN</button>
          <div id="lock-message"></div>
        </div>

        <!-- SUCCESS SCREEN -->
        <div id="lock-unlocked">
          <div class="unlock-icon">🏆</div>
          <h2>Du bist entkommen!</h2>
          <p id="success-text">
            Du hast alle Ziffern gefunden und das Schloss geknackt.<br />
            Dein Name gehört auf die Bestenliste!
          </p>
          <button id="leaderboard-btn">🏅 Leaderboard anzeigen</button>
        </div>
      </div>
    </div>

    <script>
      // =============================================
      // TIMER – liest aus sessionStorage (game-timer.js kompatibel)
      // =============================================
      function getElapsedTime() {
        const stored = sessionStorage.getItem("gameStartTime");
        if (!stored) return 0;
        return Math.floor((Date.now() - parseInt(stored)) / 1000);
      }

      function stopTimer() {
        const stored = sessionStorage.getItem("gameStartTime");
        if (!stored) return 0;
        const elapsedMillis = Date.now() - parseInt(stored);
        const elapsedSeconds = Math.floor(elapsedMillis / 1000);
        // Speichere Endzeit für leaderboard.html
        sessionStorage.setItem("gameEndTime", Date.now().toString());
        sessionStorage.setItem("gameFinalSeconds", elapsedSeconds.toString());
        sessionStorage.setItem("gameFinalMillis", elapsedMillis.toString());
        return elapsedSeconds;
      }

      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${minutes}:${secs.toString().padStart(2, "0")}`;
      }

      function formatTimeWithMillis(millis) {
        const minutes = Math.floor(millis / 60000);
        const seconds = Math.floor((millis % 60000) / 1000);
        const ms = Math.floor((millis % 1000) / 10); // Zeige 2 Stellen ms
        return `${minutes}:${seconds.toString().padStart(2, "0")}:${ms.toString().padStart(2, "0")}`;
      }

      // Sicherstellen, dass die Zeit ab "Level starten" läuft
      function ensureTimerStarted() {
        if (!sessionStorage.getItem("gameStartTime")) {
          sessionStorage.setItem("gameStartTime", Date.now().toString());
          console.log("Game timer auto-started on level enter");
        }
      }

      // Live-Timer im UI updaten
      const timerDisplay = document.getElementById("timer-display");
      setInterval(() => {
        if (timerDisplay) {
          timerDisplay.textContent = formatTime(getElapsedTime());
        }
      }, 1000);

      // =============================================
      // CODES
      // =============================================
      const player = document.getElementById("player");
      const mapEl = document.getElementById("map");
      const interaction = document.getElementById("interaction");
      const coin = document.getElementById("coin");
      const lockOverlay = document.getElementById("lock-overlay");
      const lockClose = document.getElementById("lock-close");
      const lockSubmit = document.getElementById("lock-submit");
      const lockMessage = document.getElementById("lock-message");
      const lockInputSection = document.getElementById("lock-input-section");
      const lockUnlocked = document.getElementById("lock-unlocked");
      const leaderboardBtn = document.getElementById("leaderboard-btn");
      const slots = [1, 2, 3, 4, 5].map((i) =>
        document.getElementById(`slot${i}`),
      );

      function initSecretCodes() {
        if (!localStorage.getItem("secret_code_l1")) {
          localStorage.setItem(
            "secret_code_l1",
            String(Math.floor(Math.random() * 10)),
          );
          localStorage.setItem(
            "secret_code_l3",
            String(Math.floor(Math.random() * 10)),
          );
          localStorage.setItem(
            "secret_code_l5",
            String(Math.floor(Math.random() * 10)),
          );
          localStorage.setItem(
            "secret_code_l7",
            String(Math.floor(Math.random() * 10)),
          );
        }
      }
      initSecretCodes();

      // =============================================
      // BIKE LOCK WHEELS
      // =============================================
      const NUM_WHEELS = 4;
      const wheelValues = [0, 0, 0, 0];
      const ITEM_H = 52;

      function buildWheel(i) {
        const inner = document.getElementById(`inner${i}`);
        inner.innerHTML = "";
        for (let rep = 0; rep < 3; rep++) {
          for (let d = 0; d < 10; d++) {
            const div = document.createElement("div");
            div.className = "wheel-digit";
            div.textContent = d;
            inner.appendChild(div);
          }
        }
        setWheelPosition(i, 0, false);
      }

      function setWheelPosition(i, digit, animate) {
        wheelValues[i] = ((digit % 10) + 10) % 10;
        const inner = document.getElementById(`inner${i}`);
        const centerOffset = (160 - ITEM_H) / 2;
        const targetY = -((10 + wheelValues[i]) * ITEM_H) + centerOffset;
        inner.style.transition = animate
          ? "transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94)"
          : "none";
        inner.style.transform = `translateY(${targetY}px)`;
        inner.querySelectorAll(".wheel-digit").forEach((el, idx) => {
          el.classList.toggle("selected", idx % 10 === wheelValues[i]);
        });
      }

      function scrollWheel(i, direction) {
        setWheelPosition(i, (wheelValues[i] + direction + 10) % 10, true);
      }

      for (let i = 0; i < NUM_WHEELS; i++) buildWheel(i);

      const dragState = {};
      for (let i = 0; i < NUM_WHEELS; i++) {
        const drum = document.getElementById(`wheel${i}`);
        const idx = i;
        drum.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            scrollWheel(idx, e.deltaY > 0 ? 1 : -1);
          },
          { passive: false },
        );

        let touchStartY = 0,
          touchStartVal = 0;
        drum.addEventListener("touchstart", (e) => {
          touchStartY = e.touches[0].clientY;
          touchStartVal = wheelValues[idx];
        });
        drum.addEventListener(
          "touchmove",
          (e) => {
            e.preventDefault();
            const steps = Math.round((touchStartY - e.touches[0].clientY) / 30);
            setWheelPosition(idx, (touchStartVal + steps + 100) % 10, true);
          },
          { passive: false },
        );

        drum.addEventListener("mousedown", (e) => {
          dragState[idx] = {
            startY: e.clientY,
            startVal: wheelValues[idx],
            active: true,
          };
        });
      }

      document.addEventListener("mousemove", (e) => {
        for (let i = 0; i < NUM_WHEELS; i++) {
          if (dragState[i] && dragState[i].active) {
            const steps = Math.round((dragState[i].startY - e.clientY) / 20);
            setWheelPosition(
              i,
              (dragState[i].startVal + steps + 100) % 10,
              false,
            );
          }
        }
      });
      document.addEventListener("mouseup", () => {
        for (let i = 0; i < NUM_WHEELS; i++) {
          if (dragState[i]) dragState[i].active = false;
        }
      });

      // =============================================
      // LOCK OPEN / CHECK
      // =============================================
      function openLock() {
        lockOverlay.classList.add("active");
        updateHintDots();
        lockMessage.textContent = "";
        const unlocked =
          localStorage.getItem("secret_door_unlocked") === "true";
        lockInputSection.style.display = unlocked ? "none" : "block";
        lockUnlocked.style.display = unlocked ? "block" : "none";
      }

      function updateHintDots() {
        ["l1", "l3", "l5", "l7"].forEach((k, i) => {
          document
            .getElementById(`hint-d${i + 1}`)
            .classList.toggle(
              "found",
              localStorage.getItem(`secret_code_${k}_found`) === "true",
            );
        });
      }

      lockClose.addEventListener("click", () =>
        lockOverlay.classList.remove("active"),
      );
      lockOverlay.addEventListener("click", (e) => {
        if (e.target === lockOverlay) lockOverlay.classList.remove("active");
      });
      lockSubmit.addEventListener("click", checkLockCode);
      leaderboardBtn.addEventListener("click", () => {
        window.location.href = "leaderboard.html";
      });

      function checkLockCode() {
        const entered = wheelValues.join("");
        const correct = ["l1", "l3", "l5", "l7"]
          .map((k) => localStorage.getItem(`secret_code_${k}`))
          .join("");

        if (entered === correct) {
          // ── TIMER STOPPEN ──
          stopTimer();
          const finalMillis = parseInt(sessionStorage.getItem("gameFinalMillis"));
          const formattedTime = formatTimeWithMillis(finalMillis);

          localStorage.setItem("secret_door_unlocked", "true");
          // Zeit auch in localStorage für leaderboard
          localStorage.setItem("game_completion_time", finalMillis.toString());
          localStorage.setItem("game_completion_time_formatted", formattedTime);

          lockMessage.textContent = "";
          lockInputSection.style.display = "none";
          lockUnlocked.style.display = "block";

          // Erfolgstext mit Zeit befüllen
          document.getElementById("success-text").innerHTML =
            `Du hast alle Ziffern in <span class="time-highlight">${formattedTime}</span> gefunden und das Schloss geknackt.<br>Dein Name gehört auf die Bestenliste!`;
        } else {
          lockMessage.innerHTML =
            "<span style='color:#cc4444'>✗ Falscher Code!</span>";
          const body = document.getElementById("bike-lock-body");
          body.classList.remove("shake");
          void body.offsetWidth;
          body.classList.add("shake");
          setTimeout(() => body.classList.remove("shake"), 500);
        }
      }

      // =============================================
      // PLAYER & GAME LOOP
      // =============================================
      let playerX = 200,
        playerY = 200;
      const SPEED = 3;
      const keysDown = { w: false, a: false, s: false, d: false };

      let canPickupCoin = false;
      let canOpenGreenRoom = false,
        canEnterGreenRoom = false;
      let canOpenRedRoom = false,
        canEnterRedRoom = false;
      let canOpenPurpleRoom = false,
        canEnterPurpleRoom = false;
      let canOpenOrangeRoom = false,
        canEnterOrangeRoom = false;
      let canOpenBlueRoom = false,
        canEnterBlueRoom = false;
      let canOpenYellowRoom = false,
        canEnterYellowRoom = false;
      let canOpenCyanRoom = false,
        canEnterCyanRoom = false;
      let canOpenMagentaRoom = false,
        canEnterMagentaRoom = false;
      let canOpenSecretDoor = false;
      let canEnterEasterEgg = false;

      const R1 = { x: 300, y: 150, w: 250, h: 200 },
        R2 = { x: 750, y: 100, w: 250, h: 200 };
      const R3 = { x: 150, y: 500, w: 250, h: 200 },
        R4 = { x: 1200, y: 450, w: 250, h: 200 };
      const R5 = { x: 600, y: 800, w: 250, h: 200 },
        R6 = { x: 1500, y: 150, w: 250, h: 200 };
      const R7 = { x: 250, y: 850, w: 250, h: 200 },
        R8 = { x: 1400, y: 800, w: 250, h: 200 };
      const COIN = { x: 900, y: 500, w: 25, h: 25 };
      const DOOR = { x: 1975, y: 555, w: 25, h: 90 };
      const EGG = { x: Math.random() * 1800 + 100, y: 1150, w: 50, h: 50 };

      function updateInventory() {
        const items = [];
        if (localStorage.getItem("has_coin") === "true") items.push("💰");
        if (localStorage.getItem("level1_key") === "true") items.push("🔑");
        if (localStorage.getItem("has_diamond") === "true") items.push("💎");
        if (localStorage.getItem("has_ruby") === "true") items.push("💎");
        if (localStorage.getItem("has_emerald") === "true") items.push("💎");
        if (localStorage.getItem("has_sapphire") === "true") items.push("💎");
        if (localStorage.getItem("has_topaz") === "true") items.push("💎");
        if (localStorage.getItem("has_amethyst") === "true") items.push("💎");
        slots.forEach((s, i) => (s.innerText = items[i] || ""));
        if (
          (localStorage.getItem("has_coin") === "true" ||
            localStorage.getItem("green_room_open") === "true") &&
          coin
        )
          coin.style.display = "none";
      }
      updateInventory();

      document.getElementById("restart-btn").addEventListener("click", () => {
        [
          "has_coin",
          "level1_key",
          "has_diamond",
          "has_ruby",
          "has_emerald",
          "has_sapphire",
          "has_topaz",
          "has_amethyst",
          "green_room_open",
          "red_room_open",
          "purple_room_open",
          "orange_room_open",
          "blue_room_open",
          "yellow_room_open",
          "cyan_room_open",
          "magenta_room_open",
          "secret_code_l1",
          "secret_code_l3",
          "secret_code_l5",
          "secret_code_l7",
          "secret_code_l1_found",
          "secret_code_l3_found",
          "secret_code_l5_found",
          "secret_code_l7_found",
          "secret_door_unlocked",
          "secret_code_l5_led",
          "game_completion_time",
          "game_completion_time_formatted",
        ].forEach((k) => localStorage.removeItem(k));
        sessionStorage.removeItem("gameStartTime");
        sessionStorage.removeItem("gameEndTime");
        sessionStorage.removeItem("gameFinalSeconds");
        window.location.reload();
      });

      function updateCamera() {
        let cx = Math.max(0, Math.min(playerX - 400, 1200));
        let cy = Math.max(0, Math.min(playerY - 225, 750));
        mapEl.style.left = -cx + "px";
        mapEl.style.top = -cy + "px";
      }

      function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
        return !(ax > bx + bw || ax + aw < bx || ay > by + bh || ay + ah < by);
      }

      function touching(r) {
        const m = 10;
        return (
          (Math.abs(playerX + 30 - r.x) < m &&
            playerY + 30 > r.y &&
            playerY < r.y + r.h) ||
          (Math.abs(playerX - (r.x + r.w)) < m &&
            playerY + 30 > r.y &&
            playerY < r.y + r.h) ||
          (Math.abs(playerY + 30 - r.y) < m &&
            playerX + 30 > r.x &&
            playerX < r.x + r.w) ||
          (Math.abs(playerY - (r.y + r.h)) < m &&
            playerX + 30 > r.x &&
            playerX < r.x + r.w)
        );
      }

      function collide(r, isOpen) {
        if (isOpen) return;
        if (
          playerX + 30 > r.x &&
          playerX < r.x &&
          playerY + 30 > r.y &&
          playerY < r.y + r.h
        )
          playerX = r.x - 30;
        if (
          playerX < r.x + r.w &&
          playerX + 30 > r.x + r.w &&
          playerY + 30 > r.y &&
          playerY < r.y + r.h
        )
          playerX = r.x + r.w;
        if (
          playerY + 30 > r.y &&
          playerY < r.y &&
          playerX + 30 > r.x &&
          playerX < r.x + r.w
        )
          playerY = r.y - 30;
        if (
          playerY < r.y + r.h &&
          playerY + 30 > r.y + r.h &&
          playerX + 30 > r.x &&
          playerX < r.x + r.w
        )
          playerY = r.y + r.h;
      }

      function gameLoop() {
        if (!lockOverlay.classList.contains("active")) {
          if (keysDown.w) playerY -= SPEED;
          if (keysDown.s) playerY += SPEED;
          if (keysDown.a) playerX -= SPEED;
          if (keysDown.d) playerX += SPEED;
        }

        playerX = Math.max(0, Math.min(playerX, 1970));
        playerY = Math.max(0, Math.min(playerY, 1170));

        const g = localStorage.getItem("green_room_open") === "true";
        const r = localStorage.getItem("red_room_open") === "true";
        const p = localStorage.getItem("purple_room_open") === "true";
        const o = localStorage.getItem("orange_room_open") === "true";
        const b = localStorage.getItem("blue_room_open") === "true";
        const y = localStorage.getItem("yellow_room_open") === "true";
        const c = localStorage.getItem("cyan_room_open") === "true";
        const m = localStorage.getItem("magenta_room_open") === "true";

        collide(R1, g);
        collide(R2, r);
        collide(R3, p);
        collide(R4, o);
        collide(R5, b);
        collide(R6, y);
        collide(R7, c);
        collide(R8, m);

        player.style.left = playerX + "px";
        player.style.top = playerY + "px";
        updateCamera();

        const hasCoin = localStorage.getItem("has_coin") === "true";
        const hasKey = localStorage.getItem("level1_key") === "true";
        const hasDiamond = localStorage.getItem("has_diamond") === "true";
        const hasRuby = localStorage.getItem("has_ruby") === "true";
        const hasEmerald = localStorage.getItem("has_emerald") === "true";
        const hasSapphire = localStorage.getItem("has_sapphire") === "true";
        const hasTopaz = localStorage.getItem("has_topaz") === "true";
        const hasAmethyst = localStorage.getItem("has_amethyst") === "true";

        interaction.style.left = playerX - 25 + "px";
        interaction.style.top = playerY - 38 + "px";
        interaction.style.display = "none";

        canPickupCoin = canOpenGreenRoom = canEnterGreenRoom = false;
        canOpenRedRoom = canEnterRedRoom = false;
        canOpenPurpleRoom = canEnterPurpleRoom = false;
        canOpenOrangeRoom = canEnterOrangeRoom = false;
        canOpenBlueRoom = canEnterBlueRoom = false;
        canOpenYellowRoom = canEnterYellowRoom = false;
        canOpenCyanRoom = canEnterCyanRoom = false;
        canOpenMagentaRoom = canEnterMagentaRoom = false;
        canOpenSecretDoor = false;
        canEnterEasterEgg = false;

        const px = { x: playerX, y: playerY, w: 30, h: 30 };

        if (overlap(px.x, px.y, px.w, px.h, EGG.x, EGG.y, EGG.w, EGG.h)) {
          interaction.style.display = "block";
          interaction.innerText = "E - ??? 🥚";
          canEnterEasterEgg = true;
        }
        if (
          touching(DOOR) ||
          overlap(px.x, px.y, px.w, px.h, DOOR.x, DOOR.y, DOOR.w, DOOR.h)
        ) {
          interaction.style.display = "block";
          interaction.innerText = "E - 🔐 Geheimtür";
          canOpenSecretDoor = true;
        }
        if (
          !hasCoin &&
          coin.style.display !== "none" &&
          overlap(px.x, px.y, px.w, px.h, COIN.x, COIN.y, COIN.w, COIN.h)
        ) {
          interaction.style.display = "block";
          interaction.innerText = "E - Coin aufheben";
          canPickupCoin = true;
        }

        if (!g) {
          if (hasCoin && touching(R1)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Grünen Raum öffnen";
            canOpenGreenRoom = true;
          } else if (!hasCoin && touching(R1)) {
            interaction.style.display = "block";
            interaction.innerText = "💰 Coin benötigt";
          }
        } else {
          document.getElementById("room1").className = "room green-open";
          if (overlap(px.x, px.y, px.w, px.h, R1.x, R1.y, R1.w, R1.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 1 starten";
            canEnterGreenRoom = true;
          }
        }
        if (!r) {
          if (hasKey && touching(R2)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Roten Raum öffnen";
            canOpenRedRoom = true;
          } else if (!hasKey && touching(R2)) {
            interaction.style.display = "block";
            interaction.innerText = "🔑 Schlüssel benötigt (Level 1)";
          }
        } else {
          document.getElementById("room2").className = "room open";
          if (overlap(px.x, px.y, px.w, px.h, R2.x, R2.y, R2.w, R2.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 2 starten";
            canEnterRedRoom = true;
          }
        }
        if (!p) {
          if (hasDiamond && touching(R3)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Lila Raum öffnen";
            canOpenPurpleRoom = true;
          } else if (!hasDiamond && touching(R3)) {
            interaction.style.display = "block";
            interaction.innerText = "💎 Diamant benötigt (Level 2)";
          }
        } else {
          document.getElementById("room3").className = "room purple-open";
          if (overlap(px.x, px.y, px.w, px.h, R3.x, R3.y, R3.w, R3.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 3 starten";
            canEnterPurpleRoom = true;
          }
        }
        if (!o) {
          if (hasRuby && touching(R4)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Orangenen Raum öffnen";
            canOpenOrangeRoom = true;
          } else if (!hasRuby && touching(R4)) {
            interaction.style.display = "block";
            interaction.innerText = "💎 Rubin benötigt (Level 3)";
          }
        } else {
          document.getElementById("room4").className = "room orange-open";
          if (overlap(px.x, px.y, px.w, px.h, R4.x, R4.y, R4.w, R4.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 4 starten";
            canEnterOrangeRoom = true;
          }
        }
        if (!b) {
          if (hasEmerald && touching(R5)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Blauen Raum öffnen";
            canOpenBlueRoom = true;
          } else if (!hasEmerald && touching(R5)) {
            interaction.style.display = "block";
            interaction.innerText = "💎 Smaragd benötigt (Level 4)";
          }
        } else {
          document.getElementById("room5").className = "room blue-open";
          if (overlap(px.x, px.y, px.w, px.h, R5.x, R5.y, R5.w, R5.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 5 starten";
            canEnterBlueRoom = true;
          }
        }
        if (!y) {
          if (hasSapphire && touching(R6)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Gelben Raum öffnen";
            canOpenYellowRoom = true;
          } else if (!hasSapphire && touching(R6)) {
            interaction.style.display = "block";
            interaction.innerText = "💎 Saphir benötigt (Level 5)";
          }
        } else {
          document.getElementById("room6").className = "room yellow-open";
          if (overlap(px.x, px.y, px.w, px.h, R6.x, R6.y, R6.w, R6.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 6 starten";
            canEnterYellowRoom = true;
          }
        }
        if (!c) {
          if (hasTopaz && touching(R7)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Cyan Raum öffnen";
            canOpenCyanRoom = true;
          } else if (!hasTopaz && touching(R7)) {
            interaction.style.display = "block";
            interaction.innerText = "💎 Topas benötigt (Level 6)";
          }
        } else {
          document.getElementById("room7").className = "room cyan-open";
          if (overlap(px.x, px.y, px.w, px.h, R7.x, R7.y, R7.w, R7.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 7 starten";
            canEnterCyanRoom = true;
          }
        }
        if (!m) {
          if (hasAmethyst && touching(R8)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Magenta Raum öffnen";
            canOpenMagentaRoom = true;
          } else if (!hasAmethyst && touching(R8)) {
            interaction.style.display = "block";
            interaction.innerText = "💎 Amethyst benötigt (Level 7)";
          }
        } else {
          document.getElementById("room8").className = "room magenta-open";
          if (overlap(px.x, px.y, px.w, px.h, R8.x, R8.y, R8.w, R8.h)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Final Level starten";
            canEnterMagentaRoom = true;
          }
        }

        requestAnimationFrame(gameLoop);
      }

      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (keysDown[k] !== undefined) keysDown[k] = true;
        if (lockOverlay.classList.contains("active")) {
          if (k === "enter") checkLockCode();
          if (k === "escape") lockOverlay.classList.remove("active");
          return;
        }
        if (k !== "e") return;
        if (canEnterEasterEgg) {
          window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
          return;
        }
        if (canOpenSecretDoor) {
          openLock();
          return;
        }
        if (canPickupCoin) {
          localStorage.setItem("has_coin", "true");
          updateInventory();
          return;
        }
        if (canOpenGreenRoom) {
          localStorage.removeItem("has_coin");
          localStorage.setItem("green_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterGreenRoom) {
          ensureTimerStarted();
          window.location.href = "level1.html";
          return;
        }
        if (canOpenRedRoom) {
          localStorage.removeItem("level1_key");
          localStorage.setItem("red_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterRedRoom) {
          ensureTimerStarted();
          window.location.href = "level2.html";
          return;
        }
        if (canOpenPurpleRoom) {
          localStorage.removeItem("has_diamond");
          localStorage.setItem("purple_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterPurpleRoom) {
          ensureTimerStarted();
          window.location.href = "level3.html";
          return;
        }
        if (canOpenOrangeRoom) {
          localStorage.removeItem("has_ruby");
          localStorage.setItem("orange_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterOrangeRoom) {
          ensureTimerStarted();
          window.location.href = "level4.html";
          return;
        }
        if (canOpenBlueRoom) {
          localStorage.removeItem("has_emerald");
          localStorage.setItem("blue_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterBlueRoom) {
          ensureTimerStarted();
          window.location.href = "level5.html";
          return;
        }
        if (canOpenYellowRoom) {
          localStorage.removeItem("has_sapphire");
          localStorage.setItem("yellow_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterYellowRoom) {
          ensureTimerStarted();
          window.location.href = "level6.html";
          return;
        }
        if (canOpenCyanRoom) {
          localStorage.removeItem("has_topaz");
          localStorage.setItem("cyan_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterCyanRoom) {
          ensureTimerStarted();
          window.location.href = "level7.html";
          return;
        }
        if (canOpenMagentaRoom) {
          localStorage.removeItem("has_amethyst");
          localStorage.setItem("magenta_room_open", "true");
          updateInventory();
          return;
        }
        if (canEnterMagentaRoom) {
          ensureTimerStarted();
          window.location.href = "level8.html";
          return;
        }
      });

      window.addEventListener("keyup", (e) => {
        const k = e.key.toLowerCase();
        if (keysDown[k] !== undefined) keysDown[k] = false;
      });

      gameLoop();
    </script>
  </body>
</html>
