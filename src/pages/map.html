<!-- map.html -->
<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Map</title>
    <style>
      body {
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
      }

      #game-container {
        display: flex;
        flex-direction: column;
        border: 2px solid #555;
        background: #111;
      }

      #game-area {
        position: relative;
        width: 800px;
        height: 450px;
        background: #333;
        overflow: hidden;
      }

      #map {
        position: absolute;
        width: 2000px;
        height: 1200px;
        background: #2b2b2b;
      }

      .room {
        position: absolute;
        background: #555;
      }

      .task {
        background: #1a4d1a;
        border: 4px solid #00ff00;
      }

      .green-open {
        background: #1a4d1a;
        border: 4px solid transparent;
      }

      .locked {
        background: #8b0000;
        border: 4px solid #ff0000;
      }

      .open {
        background: #8b0000;
        border: 4px solid transparent;
      }

      .purple-locked {
        background: #4a0066;
        border: 4px solid #9933ff;
      }

      .purple-open {
        background: #4a0066;
        border: 4px solid transparent;
      }

      .orange-locked {
        background: #663300;
        border: 4px solid #ff8800;
      }

      .orange-open {
        background: #663300;
        border: 4px solid transparent;
      }

      .blue-locked {
        background: #003366;
        border: 4px solid #0066ff;
      }

      .blue-open {
        background: #003366;
        border: 4px solid transparent;
      }

      .yellow-locked {
        background: #666600;
        border: 4px solid #ffff00;
      }

      .yellow-open {
        background: #666600;
        border: 4px solid transparent;
      }

      .cyan-locked {
        background: #006666;
        border: 4px solid #00ffff;
      }

      .cyan-open {
        background: #006666;
        border: 4px solid transparent;
      }

      .magenta-locked {
        background: #660066;
        border: 4px solid #ff00ff;
      }

      .magenta-open {
        background: #660066;
        border: 4px solid transparent;
      }

      #player {
        position: absolute;
        width: 30px;
        height: 30px;
        background: #ffcc00;
        border-radius: 4px;
        border: 2px solid #000;
      }

      #coin {
        position: absolute;
        width: 25px;
        height: 25px;
        background: #ffd700;
        border-radius: 50%;
        border: 2px solid #ff8800;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 16px;
        animation: coin-float 2s ease-in-out infinite;
      }

      @keyframes coin-float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      #interaction {
        position: absolute;
        padding: 5px 10px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #fff;
        display: none;
        font-size: 14px;
        pointer-events: none;
      }

      #ui {
        width: 800px;
        height: 100px;
        background: #1a1a1a;
        border-top: 2px solid #555;
        display: flex;
        align-items: center;
        padding: 10px;
        gap: 10px;
        justify-content: space-between;
      }

      .slot {
        width: 60px;
        height: 60px;
        border: 2px solid #777;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
      }

      #restart-btn {
        padding: 10px 20px;
        background: #aa0000;
        border: 2px solid #ff4444;
        color: white;
        cursor: pointer;
        border-radius: 6px;
        font-weight: bold;
      }

      #restart-btn:hover {
        background: #cc0000;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game-area">
        <div id="map">
          <!-- Grüner Raum (Level 1 - links oben) -->
          <div
            id="room1"
            class="room task"
            style="left: 300px; top: 150px; width: 250px; height: 200px"
          ></div>

          <!-- Roter Raum (Level 2 - mitte oben) -->
          <div
            id="room2"
            class="room locked"
            style="left: 750px; top: 100px; width: 250px; height: 200px"
          ></div>

          <!-- Lila Raum (Level 3 - links mitte) -->
          <div
            id="room3"
            class="room purple-locked"
            style="left: 150px; top: 500px; width: 250px; height: 200px"
          ></div>

          <!-- Orangener Raum (Level 4 - rechts mitte) -->
          <div
            id="room4"
            class="room orange-locked"
            style="left: 1200px; top: 450px; width: 250px; height: 200px"
          ></div>

          <!-- Blauer Raum (Level 5 - mitte unten) -->
          <div
            id="room5"
            class="room blue-locked"
            style="left: 600px; top: 800px; width: 250px; height: 200px"
          ></div>

          <!-- Gelber Raum (Level 6 - rechts oben) -->
          <div
            id="room6"
            class="room yellow-locked"
            style="left: 1500px; top: 150px; width: 250px; height: 200px"
          ></div>

          <!-- Cyan Raum (Level 7 - links unten) -->
          <div
            id="room7"
            class="room cyan-locked"
            style="left: 250px; top: 850px; width: 250px; height: 200px"
          ></div>

          <!-- Magenta Raum (Final Level - rechts unten) -->
          <div
            id="room8"
            class="room magenta-locked"
            style="left: 1400px; top: 800px; width: 250px; height: 200px"
          ></div>

          <!-- Coin (mitte der Map) -->
          <div id="coin" style="left: 900px; top: 500px">💰</div>

          <div id="player"></div>
          <div id="interaction">E</div>
        </div>
      </div>

      <div id="ui">
        <div style="display: flex; gap: 10px">
          <div id="slot1" class="slot"></div>
          <div id="slot2" class="slot"></div>
          <div id="slot3" class="slot"></div>
          <div id="slot4" class="slot"></div>
          <div id="slot5" class="slot"></div>
        </div>

        <button id="restart-btn">Restart</button>
      </div>
    </div>

    <script>
      const player = document.getElementById("player");
      const map = document.getElementById("map");
      const interaction = document.getElementById("interaction");
      const slot1 = document.getElementById("slot1");
      const slot2 = document.getElementById("slot2");
      const slot3 = document.getElementById("slot3");
      const slot4 = document.getElementById("slot4");
      const slot5 = document.getElementById("slot5");
      const restartBtn = document.getElementById("restart-btn");
      const coin = document.getElementById("coin");

      const room1 = document.getElementById("room1");
      const room2 = document.getElementById("room2");
      const room3 = document.getElementById("room3");
      const room4 = document.getElementById("room4");
      const room5 = document.getElementById("room5");
      const room6 = document.getElementById("room6");
      const room7 = document.getElementById("room7");
      const room8 = document.getElementById("room8");

      let playerX = 200;
      let playerY = 200;
      const speed = 3;

      const keys = { w: false, a: false, s: false, d: false };

      let canEnterGreenRoom = false;
      let canOpenGreenRoom = false;
      let canPickupCoin = false;
      let canOpenRedRoom = false;
      let canEnterRedRoom = false;
      let canOpenPurpleRoom = false;
      let canEnterPurpleRoom = false;
      let canOpenOrangeRoom = false;
      let canEnterOrangeRoom = false;
      let canOpenBlueRoom = false;
      let canEnterBlueRoom = false;
      let canOpenYellowRoom = false;
      let canEnterYellowRoom = false;
      let canOpenCyanRoom = false;
      let canEnterCyanRoom = false;
      let canOpenMagentaRoom = false;
      let canEnterMagentaRoom = false;
      let canEnterSecretRoom = false;

      // Räume Koordinaten (updated)
      const room1Coords = { x: 300, y: 150, width: 250, height: 200 };
      const room2Coords = { x: 750, y: 100, width: 250, height: 200 };
      const room3Coords = { x: 150, y: 500, width: 250, height: 200 };
      const room4Coords = { x: 1200, y: 450, width: 250, height: 200 };
      const room5Coords = { x: 600, y: 800, width: 250, height: 200 };
      const room6Coords = { x: 1500, y: 150, width: 250, height: 200 };
      const room7Coords = { x: 250, y: 850, width: 250, height: 200 };
      const room8Coords = { x: 1400, y: 800, width: 250, height: 200 };
      const coinCoords = { x: 900, y: 500, width: 25, height: 25 };

      // Secret Easter Egg Position (unsichtbar, nur ein Trigger-Punkt an der Border)
      let secretEasterEggCoords = { x: 0, y: 0, width: 50, height: 50 };

      function generateSecretEasterEggPosition() {
        const mapWidth = 2000;
        const mapHeight = 1200;
        const triggerSize = 50; // Kleiner unsichtbarer Trigger-Bereich

        // Zufällig eine der 4 Seiten wählen: 0=oben, 1=rechts, 2=unten, 3=links
        const side = Math.floor(Math.random() * 4);

        let x, y;

        switch (side) {
          case 0: // Oben
            x = Math.random() * (mapWidth - 200) + 100;
            y = 0; // Direkt am oberen Rand
            break;
          case 1: // Rechts
            x = mapWidth - triggerSize; // Direkt am rechten Rand
            y = Math.random() * (mapHeight - 200) + 100;
            break;
          case 2: // Unten
            x = Math.random() * (mapWidth - 200) + 100;
            y = mapHeight - triggerSize; // Direkt am unteren Rand
            break;
          case 3: // Links
            x = 0; // Direkt am linken Rand
            y = Math.random() * (mapHeight - 200) + 100;
            break;
        }

        secretEasterEggCoords = {
          x: x,
          y: y,
          width: triggerSize,
          height: triggerSize,
        };

        console.log(`🥚 Secret Easter Egg at side ${side}: (${x}, ${y})`);
      }

      // Secret Easter Egg Position beim Laden generieren
      generateSecretEasterEggPosition();

      function updateInventory() {
        const hasCoin = localStorage.getItem("has_coin") === "true";
        const hasKey = localStorage.getItem("level1_key") === "true";
        const hasDiamond = localStorage.getItem("has_diamond") === "true";
        const hasRuby = localStorage.getItem("has_ruby") === "true";
        const hasEmerald = localStorage.getItem("has_emerald") === "true";
        const hasSapphire = localStorage.getItem("has_sapphire") === "true";
        const hasTopaz = localStorage.getItem("has_topaz") === "true";
        const hasAmethyst = localStorage.getItem("has_amethyst") === "true";
        const greenRoomOpen =
          localStorage.getItem("green_room_open") === "true";

        const items = [];
        if (hasCoin) items.push("💰");
        if (hasKey) items.push("🔑");
        if (hasDiamond) items.push("💎");
        if (hasRuby) items.push("💎");
        if (hasEmerald) items.push("💎");
        if (hasSapphire) items.push("💎");
        if (hasTopaz) items.push("💎");
        if (hasAmethyst) items.push("💎");

        slot1.innerText = "";
        slot2.innerText = "";
        slot3.innerText = "";
        slot4.innerText = "";
        slot5.innerText = "";

        if (items.length > 0) slot1.innerText = items[0];
        if (items.length > 1) slot2.innerText = items[1];
        if (items.length > 2) slot3.innerText = items[2];
        if (items.length > 3) slot4.innerText = items[3];
        if (items.length > 4) slot5.innerText = items[4];

        if ((hasCoin || greenRoomOpen) && coin) {
          coin.style.display = "none";
        }
      }
      updateInventory();

      restartBtn.addEventListener("click", () => {
        localStorage.removeItem("has_coin");
        localStorage.removeItem("level1_key");
        localStorage.removeItem("has_diamond");
        localStorage.removeItem("has_ruby");
        localStorage.removeItem("has_emerald");
        localStorage.removeItem("has_sapphire");
        localStorage.removeItem("has_topaz");
        localStorage.removeItem("has_amethyst");
        localStorage.removeItem("green_room_open");
        localStorage.removeItem("red_room_open");
        localStorage.removeItem("purple_room_open");
        localStorage.removeItem("orange_room_open");
        localStorage.removeItem("blue_room_open");
        localStorage.removeItem("yellow_room_open");
        localStorage.removeItem("cyan_room_open");
        localStorage.removeItem("magenta_room_open");
        window.location.reload();
      });

      function updateCamera() {
        const viewWidth = 800;
        const viewHeight = 450;

        let camX = playerX - viewWidth / 2;
        let camY = playerY - viewHeight / 2;

        camX = Math.max(0, Math.min(camX, 2000 - viewWidth));
        camY = Math.max(0, Math.min(camY, 1200 - viewHeight));

        map.style.left = -camX + "px";
        map.style.top = -camY + "px";
      }

      function checkRoomCollision(roomCoords, isOpen) {
        if (isOpen) return;

        const nextLeft = playerX;
        const nextRight = playerX + 30;
        const nextTop = playerY;
        const nextBottom = playerY + 30;

        const roomLeft = roomCoords.x;
        const roomRight = roomCoords.x + roomCoords.width;
        const roomTop = roomCoords.y;
        const roomBottom = roomCoords.y + roomCoords.height;

        if (
          nextRight > roomLeft &&
          nextLeft < roomLeft &&
          nextBottom > roomTop &&
          nextTop < roomBottom
        ) {
          playerX = roomLeft - 30;
        }

        if (
          nextLeft < roomRight &&
          nextRight > roomRight &&
          nextBottom > roomTop &&
          nextTop < roomBottom
        ) {
          playerX = roomRight;
        }

        if (
          nextBottom > roomTop &&
          nextTop < roomTop &&
          nextRight > roomLeft &&
          nextLeft < roomRight
        ) {
          playerY = roomTop - 30;
        }

        if (
          nextTop < roomBottom &&
          nextBottom > roomBottom &&
          nextRight > roomLeft &&
          nextLeft < roomRight
        ) {
          playerY = roomBottom;
        }
      }

      function update() {
        let oldX = playerX;
        let oldY = playerY;

        if (keys.w) playerY -= speed;
        if (keys.s) playerY += speed;
        if (keys.a) playerX -= speed;
        if (keys.d) playerX += speed;

        if (playerX < 0) playerX = 0;
        if (playerY < 0) playerY = 0;
        if (playerX > 2000 - 30) playerX = 2000 - 30;
        if (playerY > 1200 - 30) playerY = 1200 - 30;

        const greenRoomOpen =
          localStorage.getItem("green_room_open") === "true";
        const redRoomOpen = localStorage.getItem("red_room_open") === "true";
        const purpleRoomOpen =
          localStorage.getItem("purple_room_open") === "true";
        const orangeRoomOpen =
          localStorage.getItem("orange_room_open") === "true";
        const blueRoomOpen = localStorage.getItem("blue_room_open") === "true";
        const yellowRoomOpen =
          localStorage.getItem("yellow_room_open") === "true";
        const cyanRoomOpen = localStorage.getItem("cyan_room_open") === "true";
        const magentaRoomOpen =
          localStorage.getItem("magenta_room_open") === "true";

        checkRoomCollision(room1Coords, greenRoomOpen);
        checkRoomCollision(room2Coords, redRoomOpen);
        checkRoomCollision(room3Coords, purpleRoomOpen);
        checkRoomCollision(room4Coords, orangeRoomOpen);
        checkRoomCollision(room5Coords, blueRoomOpen);
        checkRoomCollision(room6Coords, yellowRoomOpen);
        checkRoomCollision(room7Coords, cyanRoomOpen);
        checkRoomCollision(room8Coords, magentaRoomOpen);
        // Secret Easter Egg ist nur ein Trigger, keine Kollision

        player.style.left = playerX + "px";
        player.style.top = playerY + "px";

        updateCamera();

        const hasCoin = localStorage.getItem("has_coin") === "true";
        const hasKey = localStorage.getItem("level1_key") === "true";
        const hasDiamond = localStorage.getItem("has_diamond") === "true";
        const hasRuby = localStorage.getItem("has_ruby") === "true";
        const hasEmerald = localStorage.getItem("has_emerald") === "true";
        const hasSapphire = localStorage.getItem("has_sapphire") === "true";
        const hasTopaz = localStorage.getItem("has_topaz") === "true";
        const hasAmethyst = localStorage.getItem("has_amethyst") === "true";

        interaction.style.left = playerX - 25 + "px";
        interaction.style.top = playerY - 35 + "px";

        interaction.style.display = "none";
        canEnterGreenRoom = false;
        canPickupCoin = false;
        canOpenRedRoom = false;
        canEnterRedRoom = false;
        canOpenPurpleRoom = false;
        canEnterPurpleRoom = false;
        canOpenOrangeRoom = false;
        canEnterOrangeRoom = false;
        canOpenBlueRoom = false;
        canEnterBlueRoom = false;
        canOpenYellowRoom = false;
        canEnterYellowRoom = false;
        canOpenCyanRoom = false;
        canEnterCyanRoom = false;
        canOpenMagentaRoom = false;
        canEnterMagentaRoom = false;
        canEnterSecretRoom = false;

        const playerRect = { x: playerX, y: playerY, width: 30, height: 30 };

        // SECRET EASTER EGG Check (unsichtbar, nur Trigger wenn man dran läuft)
        if (rectsOverlap(playerRect, secretEasterEggCoords)) {
          interaction.style.display = "block";
          interaction.innerText = "E - ??? 🥚";
          canEnterSecretRoom = true;
        }

        // COIN AUFHEBEN
        if (!hasCoin && coin.style.display !== "none") {
          if (rectsOverlap(playerRect, coinCoords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um Coin aufzuheben";
            canPickupCoin = true;
          }
        }

        // GRÜNER RAUM
        if (!greenRoomOpen && hasCoin) {
          if (isTouchingRoom(room1Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den grünen Raum zu öffnen";
            canOpenGreenRoom = true;
          }
        }

        if (!greenRoomOpen && !hasCoin) {
          if (isTouchingRoom(room1Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Coin benötigt";
          }
        }

        if (greenRoomOpen) {
          room1.classList.remove("task");
          room1.classList.add("green-open");

          if (rectsOverlap(playerRect, room1Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 1 starten";
            canEnterGreenRoom = true;
          }
        }

        // ROTER RAUM
        if (!redRoomOpen && hasKey) {
          if (isTouchingRoom(room2Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den roten Raum zu öffnen";
            canOpenRedRoom = true;
          }
        }

        if (!redRoomOpen && !hasKey) {
          if (isTouchingRoom(room2Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Schlüssel benötigt (Level 1 abschließen)";
          }
        }

        if (redRoomOpen) {
          room2.classList.remove("locked");
          room2.classList.add("open");

          if (rectsOverlap(playerRect, room2Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 2 starten";
            canEnterRedRoom = true;
          }
        }

        // LILA RAUM
        if (!purpleRoomOpen && hasDiamond) {
          if (isTouchingRoom(room3Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den lila Raum zu öffnen";
            canOpenPurpleRoom = true;
          }
        }

        if (!purpleRoomOpen && !hasDiamond) {
          if (isTouchingRoom(room3Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Diamant benötigt (Level 2 abschließen)";
          }
        }

        if (purpleRoomOpen) {
          room3.classList.remove("purple-locked");
          room3.classList.add("purple-open");

          if (rectsOverlap(playerRect, room3Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 3 starten";
            canEnterPurpleRoom = true;
          }
        }

        // ORANGENER RAUM
        if (!orangeRoomOpen && hasRuby) {
          if (isTouchingRoom(room4Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den orangenen Raum zu öffnen";
            canOpenOrangeRoom = true;
          }
        }

        if (!orangeRoomOpen && !hasRuby) {
          if (isTouchingRoom(room4Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Rubin benötigt (Level 3 abschließen)";
          }
        }

        if (orangeRoomOpen) {
          room4.classList.remove("orange-locked");
          room4.classList.add("orange-open");

          if (rectsOverlap(playerRect, room4Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 4 starten";
            canEnterOrangeRoom = true;
          }
        }

        // BLAUER RAUM
        if (!blueRoomOpen && hasEmerald) {
          if (isTouchingRoom(room5Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den blauen Raum zu öffnen";
            canOpenBlueRoom = true;
          }
        }

        if (!blueRoomOpen && !hasEmerald) {
          if (isTouchingRoom(room5Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Smaragd benötigt (Level 4 abschließen)";
          }
        }

        if (blueRoomOpen) {
          room5.classList.remove("blue-locked");
          room5.classList.add("blue-open");

          if (rectsOverlap(playerRect, room5Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 5 starten";
            canEnterBlueRoom = true;
          }
        }

        // GELBER RAUM
        if (!yellowRoomOpen && hasSapphire) {
          if (isTouchingRoom(room6Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den gelben Raum zu öffnen";
            canOpenYellowRoom = true;
          }
        }

        if (!yellowRoomOpen && !hasSapphire) {
          if (isTouchingRoom(room6Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Saphir benötigt (Level 5 abschließen)";
          }
        }

        if (yellowRoomOpen) {
          room6.classList.remove("yellow-locked");
          room6.classList.add("yellow-open");

          if (rectsOverlap(playerRect, room6Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 6 starten";
            canEnterYellowRoom = true;
          }
        }

        // CYAN RAUM
        if (!cyanRoomOpen && hasTopaz) {
          if (isTouchingRoom(room7Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den cyan Raum zu öffnen";
            canOpenCyanRoom = true;
          }
        }

        if (!cyanRoomOpen && !hasTopaz) {
          if (isTouchingRoom(room7Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Topas benötigt (Level 6 abschließen)";
          }
        }

        if (cyanRoomOpen) {
          room7.classList.remove("cyan-locked");
          room7.classList.add("cyan-open");

          if (rectsOverlap(playerRect, room7Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Level 7 starten";
            canEnterCyanRoom = true;
          }
        }

        // MAGENTA RAUM
        if (!magentaRoomOpen && hasAmethyst) {
          if (isTouchingRoom(room8Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Drücke E um den magenta Raum zu öffnen";
            canOpenMagentaRoom = true;
          }
        }

        if (!magentaRoomOpen && !hasAmethyst) {
          if (isTouchingRoom(room8Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "Amethyst benötigt (Level 7 abschließen)";
          }
        }

        if (magentaRoomOpen) {
          room8.classList.remove("magenta-locked");
          room8.classList.add("magenta-open");

          if (rectsOverlap(playerRect, room8Coords)) {
            interaction.style.display = "block";
            interaction.innerText = "E - Final Level starten";
            canEnterMagentaRoom = true;
          }
        }

        requestAnimationFrame(update);
      }

      function isTouchingRoom(roomCoords) {
        const touchingLeft =
          Math.abs(playerX + 30 - roomCoords.x) < 10 &&
          playerY + 30 > roomCoords.y &&
          playerY < roomCoords.y + roomCoords.height;

        const touchingRight =
          Math.abs(playerX - (roomCoords.x + roomCoords.width)) < 10 &&
          playerY + 30 > roomCoords.y &&
          playerY < roomCoords.y + roomCoords.height;

        const touchingTop =
          Math.abs(playerY + 30 - roomCoords.y) < 10 &&
          playerX + 30 > roomCoords.x &&
          playerX < roomCoords.x + roomCoords.width;

        const touchingBottom =
          Math.abs(playerY - (roomCoords.y + roomCoords.height)) < 10 &&
          playerX + 30 > roomCoords.x &&
          playerX < roomCoords.x + roomCoords.width;

        return touchingLeft || touchingRight || touchingTop || touchingBottom;
      }

      function rectsOverlap(r1, r2) {
        return !(
          r1.x > r2.x + r2.width ||
          r1.x + r1.width < r2.x ||
          r1.y > r2.y + r2.height ||
          r1.y + r1.height < r2.y
        );
      }

      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (keys[k] !== undefined) keys[k] = true;

        // Secret Room betreten
        if (k === "e" && canEnterSecretRoom) {
          window.location.href = "easteregg.html";
        }

        // Coin aufheben
        if (k === "e" && canPickupCoin) {
          localStorage.setItem("has_coin", "true");
          updateInventory();
        }

        // Grünen Raum öffnen
        if (k === "e" && canOpenGreenRoom) {
          localStorage.removeItem("has_coin");
          updateInventory();
          localStorage.setItem("green_room_open", "true");
        }

        // Grünen Raum betreten
        if (k === "e" && canEnterGreenRoom) {
          window.location.href = "level1.html";
        }

        // Roten Raum öffnen
        if (k === "e" && canOpenRedRoom) {
          localStorage.removeItem("level1_key");
          updateInventory();
          localStorage.setItem("red_room_open", "true");
        }

        // Roten Raum betreten
        if (k === "e" && canEnterRedRoom) {
          window.location.href = "level2.html";
        }

        // Lila Raum öffnen
        if (k === "e" && canOpenPurpleRoom) {
          localStorage.removeItem("has_diamond");
          updateInventory();
          localStorage.setItem("purple_room_open", "true");
        }

        // Lila Raum betreten
        if (k === "e" && canEnterPurpleRoom) {
          window.location.href = "level3.html";
        }

        // Orangenen Raum öffnen
        if (k === "e" && canOpenOrangeRoom) {
          localStorage.removeItem("has_ruby");
          updateInventory();
          localStorage.setItem("orange_room_open", "true");
        }

        // Orangenen Raum betreten
        if (k === "e" && canEnterOrangeRoom) {
          window.location.href = "level4.html";
        }

        // Blauen Raum öffnen
        if (k === "e" && canOpenBlueRoom) {
          localStorage.removeItem("has_emerald");
          updateInventory();
          localStorage.setItem("blue_room_open", "true");
        }

        // Blauen Raum betreten
        if (k === "e" && canEnterBlueRoom) {
          window.location.href = "level5.html";
        }

        // Gelben Raum öffnen
        if (k === "e" && canOpenYellowRoom) {
          localStorage.removeItem("has_sapphire");
          updateInventory();
          localStorage.setItem("yellow_room_open", "true");
        }

        // Gelben Raum betreten
        if (k === "e" && canEnterYellowRoom) {
          window.location.href = "level6.html";
        }

        // Cyan Raum öffnen
        if (k === "e" && canOpenCyanRoom) {
          localStorage.removeItem("has_topaz");
          updateInventory();
          localStorage.setItem("cyan_room_open", "true");
        }

        // Cyan Raum betreten
        if (k === "e" && canEnterCyanRoom) {
          window.location.href = "level7.html";
        }

        // Magenta Raum öffnen
        if (k === "e" && canOpenMagentaRoom) {
          localStorage.removeItem("has_amethyst");
          updateInventory();
          localStorage.setItem("magenta_room_open", "true");
        }

        // Magenta Raum betreten
        if (k === "e" && canEnterMagentaRoom) {
          window.location.href = "level8.html";
        }
      });

      window.addEventListener("keyup", (e) => {
        const k = e.key.toLowerCase();
        if (keys[k] !== undefined) keys[k] = false;
      });

      update();
    </script>
